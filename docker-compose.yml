networks:
  hnet:
    name: hnet
    external: true

services:
  emulator:
    container_name: emulator
    platform: linux/amd64
    build:
      context: ./emulator/
    devices:
      - /dev/kvm
    volumes:
      - ./emulator/data:/data
      - ./desktop/qrcode.jpg:/tmp/qrcode.jpg
    environment:
      RAM_SIZE: 4096
      DNS: one.one.one.one
    networks:
      hnet:
    ports:
      - 5555:5555

  emulator-web:
    container_name: emulator-web
    build:
      context: ./emulator/
      dockerfile: Dockerfile.web
    restart: unless-stopped
    depends_on:
      emulator:
        condition: service_healthy
    environment:
      emulator: "${emulator:-emulator:5555}"
    command: sh start-web.sh
    networks:
      hnet:
    ports:
      - 8081:8000

  install-signal:
    container_name: install-signal
    build:
      context: ./emulator/
      dockerfile: Dockerfile.web
    volumes:
      - ./emulator/signal.apk:/tmp/signal.apk
    environment:
      emulator: "${emulator:-emulator:5555}"
    command: sh -c "adb connect $emulator && adb install /tmp/signal.apk"
    networks:
      hnet:

  pulse:
    container_name: pulse
    build:
      context: ./pulse/
    restart: unless-stopped
    volumes:
      - ./pulse/runtime:/tmp/pulse
    networks:
      hnet:

  desktop:
    container_name: desktop
    platform: linux/amd64
    build:
      context: ./desktop/
    depends_on:
      - pulse
    devices:
      - "${camera:-/dev/null}:/dev/video0"
    group_add:
      - video
    volumes:
      - ./pulse/runtime:/tmp/pulse
      - ./desktop/data:/home/hecate/.config/Signal
    networks:
      hnet:
    ports:
      - 9222:9222

  qrcode:
    container_name: qrcode
    build:
      context: .
    restart: unless-stopped
    depends_on:
      - desktop
    volumes:
      - ./desktop:/app/desktop
    command: sh -c "node src/qrcode.js"
    networks:
      hnet:

  avatar:
    container_name: avatar
    build:
      context: ./avatar/
    networks:
      hnet:
    ports:
      - 8082:8082

  loop:
    container_name: loop
    build:
      context: .
    volumes:
      - ./pulse/runtime:/tmp/pulse
      - "${prompt:-./default.txt}:/app/prompt.txt"
    env_file: .env
    environment:
      pocket: pocket:8084
    networks:
      hnet:
    ports:
      - 8083:8083

  pocket:
    container_name: pocket
    build:
      context: .
      dockerfile: Dockerfile.pocket
    volumes:
      - pocket_tts_cache:/root/.cache/pocket_tts
      - hf_cache:/root/.cache/huggingface
    command: ["serve", "--host", "0.0.0.0", "--port", "8084"]
    networks:
      hnet:
    ports:
      - 8084:8084

volumes:
  pocket_tts_cache:
  hf_cache:
